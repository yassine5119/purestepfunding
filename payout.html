<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PURESTEP PAYOUT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#020617;
color:white;
display:flex;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{

width:280px;
height:100vh;

background:#071226;

padding:30px 20px;

position:fixed;

border-right:1px solid rgba(0,255,153,0.1);

}

.logo{

font-size:36px;
font-weight:800;
text-align:center;
margin-bottom:50px;

}

.logo span{

color:#00ff99;
text-shadow:0 0 20px #00ff99;

}

.sidebar-links{

list-style:none;

}

.sidebar-links li{

margin-bottom:18px;

}

.sidebar-links a{

display:block;

padding:16px 20px;

background:#0f172a;

border-radius:16px;

text-decoration:none;
color:white;

font-weight:600;

transition:0.3s;

}

.sidebar-links a:hover{

background:#00ff99;
color:black;

}

/* MAIN */

.main{

margin-left:280px;
width:100%;
padding:40px;

}

/* TOPBAR */

.topbar{

display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;

margin-bottom:35px;

}

.topbar h1{

font-size:42px;

}

.user-box{

background:#071226;

padding:15px 25px;

border-radius:16px;

border:1px solid rgba(0,255,153,0.1);

}

/* CARDS */

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

margin-bottom:40px;

}

.card{

background:#071226;

padding:30px;

border-radius:28px;

border:1px solid rgba(0,255,153,0.1);

}

.card h2{

font-size:38px;

color:#00ff99;

margin-bottom:10px;

}

.card p{

color:#cbd5e1;

}

/* FORM */

.payout-form{

background:#071226;

padding:40px;

border-radius:30px;

border:1px solid rgba(0,255,153,0.1);

margin-bottom:40px;

}

.payout-form h2{

font-size:35px;

margin-bottom:30px;

}

.payout-form h2 span{

color:#00ff99;

}

.input-group{

margin-bottom:25px;

}

.input-group label{

display:block;

margin-bottom:10px;

font-weight:600;

color:#cbd5e1;

}

.input-group input{

width:100%;

padding:16px;

border:none;
outline:none;

border-radius:14px;

background:#0f172a;

color:white;

font-size:16px;

border:1px solid rgba(255,255,255,0.08);

}

.input-group input:focus{

border:1px solid #00ff99;

}

/* BUTTON */

.btn{

display:inline-block;

padding:18px 30px;

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

font-weight:700;

border:none;

border-radius:16px;

cursor:pointer;

font-size:17px;

transition:0.3s;

box-shadow:0 0 25px rgba(0,255,153,0.4);

}

.btn:hover{

transform:translateY(-5px);

box-shadow:0 0 40px rgba(0,255,153,0.7);

}

/* HISTORY */

.history{

background:#071226;

padding:40px;

border-radius:30px;

border:1px solid rgba(0,255,153,0.1);

}

.history h2{

font-size:35px;

margin-bottom:30px;

}

.history h2 span{

color:#00ff99;

}

.history-item{

display:flex;

justify-content:space-between;

flex-wrap:wrap;

padding:20px 0;

border-bottom:1px solid rgba(255,255,255,0.05);

}

.history-item:last-child{

border:none;

}

/* STATUS */

.pending{

color:#facc15;
font-weight:700;

}

.approved{

color:#00ff99;
font-weight:700;

}

.rejected{

color:#ef4444;
font-weight:700;

}

/* MESSAGE */

.message{

margin-top:25px;

padding:18px;

border-radius:16px;

background:#00ff99;

color:black;

font-weight:700;

display:none;

}

/* SUPPORT */

.support-btn{

position:fixed;

bottom:25px;
right:25px;

padding:18px 28px;

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

font-weight:700;

border-radius:50px;

text-decoration:none;

box-shadow:0 0 25px rgba(0,255,153,0.5);

z-index:9999;

}

/* MOBILE */

.mobile-menu{

display:none;

font-size:32px;

cursor:pointer;

margin-bottom:20px;

}

@media(max-width:900px){

.sidebar{

left:-100%;

transition:0.4s;

z-index:1000;

position:fixed;

}

.sidebar.active{

left:0;

}

.main{

margin-left:0;

padding:20px;

}

.mobile-menu{

display:block;

}

.topbar h1{

font-size:30px;

}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="logo">
PURE<span>Step</span>
</div>

<ul class="sidebar-links">

<li><a href="dashboard.html">Dashboard</a></li>

<li><a href="accounts.html">My Accounts</a></li>

<li><a href="payout.html">Payouts</a></li>

<li><a href="certificate.html">Certificates</a></li>

<li><a href="settings.html">Settings</a></li>

<li>
<a href="login.html">
Logout
</a>
</li>

</ul>

</div>

<!-- MAIN -->

<div class="main">

<div class="mobile-menu" id="menu-btn">
☰
</div>

<!-- TOPBAR -->

<div class="topbar">

<h1>
Payout Center 💸
</h1>

<div class="user-box">

<span id="username">
Loading...
</span>

</div>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">

<h2 id="availablePayout">
$0
</h2>

<p>
Available Payout
</p>

</div>

<div class="card">

<h2 id="approvedPayouts">
0
</h2>

<p>
Approved Payouts
</p>

</div>

<div class="card">

<h2 id="currentStatus">
NONE
</h2>

<p>
Current Status
</p>

</div>

</div>

<!-- FORM -->

<div class="payout-form">

<h2>
Request <span>Payout</span>
</h2>

<div class="input-group">

<label>
Payout Amount
</label>

<input
type="text"
placeholder="$150"
id="amount">

</div>

<div class="input-group">

<label>
Binance ID
</label>

<input
type="text"
placeholder="Your Binance ID"
id="binance">

</div>

<div class="input-group">

<label>
USDT Wallet Address
</label>

<input
type="text"
placeholder="Your Wallet"
id="wallet">

</div>

<button class="btn" onclick="submitPayout()">

REQUEST PAYOUT

</button>

<div class="message" id="message">

Payout Request Submitted Successfully 🚀

</div>

</div>

<!-- HISTORY -->

<div class="history">

<h2>
Payout <span>History</span>
</h2>

<div id="history-container">

</div>

</div>

</div>

<!-- SUPPORT -->

<a href="https://instagram.com/purestepfunding"
target="_blank"
class="support-btn">

Support

</a>

<!-- FIREBASE -->

<script type="module">

import { auth, db }
from "./firebase.js";

import {
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
collection,
addDoc,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* USER */

let currentUser = null;

/* FIREBASE */

onAuthStateChanged(auth, async(user)=>{

if(user){

currentUser = user;

document.getElementById("username").innerHTML =
user.email;

loadPayouts();

}else{

window.location.href =
"login.html";

}

});

/* MOBILE MENU */

const sidebar =
document.getElementById("sidebar");

const menuBtn =
document.getElementById("menu-btn");

menuBtn.onclick = () => {

sidebar.classList.toggle("active");

};

/* SUBMIT PAYOUT */

window.submitPayout = async function(){

const amount =
document.getElementById("amount").value;

const binance =
document.getElementById("binance").value;

const wallet =
document.getElementById("wallet").value;

/* VALIDATION */

if(!amount || !binance || !wallet){

alert("Fill All Fields");

return;

}

/* CREATE PAYOUT */

await addDoc(
collection(db,"payouts"),
{

uid: currentUser.uid,

email: currentUser.email,

amount: amount,

binanceId: binance,

wallet: wallet,

status: "PENDING",

createdAt: Date.now()

}
);

/* MESSAGE */

document.getElementById("message")
.style.display = "block";

/* CLEAR */

document.getElementById("amount").value = "";
document.getElementById("binance").value = "";
document.getElementById("wallet").value = "";

/* RELOAD */

loadPayouts();

};

/* LOAD PAYOUTS */

async function loadPayouts(){

const history =
document.getElementById("history-container");

history.innerHTML = "";

const q = query(

collection(db,"payouts"),

where("uid","==",currentUser.uid)

);

const querySnapshot =
await getDocs(q);

let total = 0;
let approved = 0;
let currentStatus = "NONE";

querySnapshot.forEach((docSnap)=>{

const data =
docSnap.data();

total += Number(data.amount || 0);

if(data.status === "APPROVED"){

approved++;

}

currentStatus = data.status;

/* STATUS */

let statusClass = "pending";

if(data.status === "APPROVED"){

statusClass = "approved";

}

if(data.status === "REJECTED"){

statusClass = "rejected";

}

/* HISTORY */

history.innerHTML += `

<div class="history-item">

<span>

${new Date(
data.createdAt
).toLocaleDateString()}
-
$${data.amount}

</span>

<span class="${statusClass}">

${data.status}

</span>

</div>

`;

});

/* UPDATE */

document.getElementById("availablePayout")
.innerHTML =
"$" + total;

document.getElementById("approvedPayouts")
.innerHTML =
approved;

document.getElementById("currentStatus")
.innerHTML =
currentStatus;

}

</script>

</body>

</html>
