<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - PureStep Funding</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(3,7,18,0.90),rgba(3,7,18,0.95)),
url('https://images.unsplash.com/photo-1642790106117-e829e14a795f?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;

color:white;
}

.login-box{
width:420px;
background:rgba(7,18,36,0.92);
padding:45px;
border-radius:30px;
border:1px solid rgba(0,255,153,0.2);
box-shadow:0 0 40px rgba(0,255,153,0.2);
backdrop-filter:blur(12px);
}

.logo{
text-align:center;
font-size:38px;
font-weight:800;
color:#00ff99;
margin-bottom:35px;
text-shadow:0 0 20px #00ff99;
}

.logo span{
color:#2d7cff;
}

.login-box h1{
text-align:center;
margin-bottom:30px;
font-size:34px;
}

.input-box{
margin-bottom:22px;
}

.input-box input{
width:100%;
padding:18px;
border:none;
outline:none;
border-radius:14px;
background:#0b1730;
color:white;
font-size:16px;
}

.input-box input::placeholder{
color:#94a3b8;
}

.btn{
width:100%;
padding:18px;
background:#00ff99;
border:none;
border-radius:14px;
font-size:18px;
font-weight:700;
cursor:pointer;
box-shadow:0 0 25px #00ff99;
transition:0.3s;
}

.btn:hover{
transform:translateY(-4px);
}

.bottom{
margin-top:25px;
text-align:center;
color:#cbd5e1;
}

.bottom a{
color:#00ff99;
text-decoration:none;
font-weight:700;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
<span>PURE</span>Step
</div>

<h1>Trader Login</h1>

<div class="input-box">
<input type="text" id="username" placeholder="Username">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
</div>

<button class="btn" onclick="login()">
LOGIN
</button>

<div class="bottom">
No account?
<a href="register.html">Register</a>
</div>

</div>

<script>

function login(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

if(username === "" || password === ""){

alert("Please fill all fields");

}else{

localStorage.setItem("trader", username);

window.location.href = "dashboard.html";

}

}

</script>

</body>

</html>
