<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURESTEP LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{background:#020617;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;overflow:hidden;position:relative;}
        body::before{content:"";position:absolute;top:-200px;right:-200px;width:450px;height:450px;background:rgba(0,255,153,0.08);border-radius:50%;}
        body::after{content:"";position:absolute;bottom:-200px;left:-200px;width:450px;height:450px;background:rgba(0,255,153,0.08);border-radius:50%;}
        .login-box{width:100%;max-width:420px;background:#071226;padding:45px 35px;border-radius:30px;border:1px solid rgba(0,255,153,0.08);backdrop-filter:blur(10px);position:relative;z-index:10;box-shadow:0 20px 40px rgba(0,0,0,0.3);}
        .logo{font-size:36px;font-weight:800;color:white;text-align:center;margin-bottom:30px;letter-spacing:1px;}
        .logo span{color:#00ff99;text-shadow:0 0 20px rgba(0,255,153,0.3);}
        .form-group{margin-bottom:22px;}
        .form-group label{display:block;color:#94a3b8;font-size:13px;font-weight:500;margin-bottom:9px;text-transform:uppercase;letter-spacing:0.5px;}
        .form-group input{width:100%;padding:16px 20px;background:#0f172a;border:1px solid rgba(255,255,255,0.05);border-radius:16px;color:white;font-size:15px;outline:none;transition:0.3s;}
        .form-group input:focus{border-color:#00ff99;box-shadow:0 0 15px rgba(0,255,153,0.1);background:#0a101f;}
        .options{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;font-size:13px;}
        .options label{color:#94a3b8;display:flex;align-items:center;gap:8px;cursor:pointer;}
        .options input[type="checkbox"]{accent-color:#00ff99;}
        .options a{color:#00ff99;text-decoration:none;transition:0.3s;}
        .options a:hover{text-shadow:0 0 10px #00ff99;}
        .login-btn{width:100%;padding:16px;background:linear-gradient(135deg,#00ff99,#00c97a);border:none;border-radius:16px;color:#020617;font-size:16px;font-weight:700;cursor:pointer;transition:0.3s;box-shadow:0 0 20px rgba(0,255,153,0.2);}
        .login-btn:hover{transform:translateY(-3px);box-shadow:0 0 30px rgba(0,255,153,0.4);}
        .message{padding:14px;border-radius:12px;font-size:14px;font-weight:600;text-align:center;margin-top:20px;display:none;}
        .success{background:rgba(0,255,153,0.1);color:#00ff99;border:1px solid rgba(0,255,153,0.2);}
        .error{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);}
        .register{text-align:center;margin-top:30px;font-size:14px;color:#94a3b8;}
        .register a{color:#00ff99;text-decoration:none;font-weight:600;margin-left:5px;}
        .register a:hover{text-decoration:underline;}
        .support-btn{position:fixed;bottom:20px;right:20px;padding:12px 20px;background:rgba(7,18,38,0.8);border:1px solid rgba(255,255,255,0.05);border-radius:100px;color:white;text-decoration:none;font-size:13px;font-weight:500;backdrop-filter:blur(10px);transition:0.3s;z-index:100;}
        .support-btn:hover{border-color:#00ff99;color:#00ff99;}
        @media(max-width:480px){.login-box{padding:35px 20px;}}
    </style>
</head>

<body>

    <div class="login-box">
        <div class="logo">PURE<span>Step</span></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <div class="options">
            <label>
                <input type="checkbox"> Remember me
            </label>
            <a href="#">Forgot Password?</a>
        </div>

        <button class="login-btn" onclick="loginUser()">LOGIN</button>

        <div class="message success" id="success-message">Login Successful 🚀</div>
        <div class="message error" id="error-message">Invalid Email or Password</div>

        <div class="register">
            Don't have an account? <a href="register.html">Create Account</a>
        </div>
    </div>

    <a href="https://instagram.com/purestepfunding" target="_blank" class="support-btn">Support</a>

    <script type="module">
        import { auth } from "./firebase.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        window.loginUser = async function(){
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const success = document.getElementById("success-message");
            const error = document.getElementById("error-message");

            success.style.display = "none";
            error.style.display = "none";

            if (email.trim() === "" || password.trim() === "") {
                error.innerText = "Please fill in all fields";
                error.style.display = "block";
                return;
            }

            try{
                await signInWithEmailAndPassword(auth, email, password);

                localStorage.setItem("loggedIn", "true");
                localStorage.setItem("userEmail", email);

                success.style.display = "block";

                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);

            } catch(err) {
                console.error("Login Error:", err);
                error.innerText = "Invalid Email or Password";
                error.style.display = "block";
            }
        };
    </script>
</body>
</html>
