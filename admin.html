<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
PURESTEP SECURE ADMIN PANEL
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#020617;

color:white;

padding:40px;

overflow-x:hidden;

}

/* BACKGROUND */

body::before{

content:"";

position:fixed;

top:-250px;
right:-250px;

width:500px;
height:500px;

background:rgba(0,255,153,0.05);

border-radius:50%;

z-index:-1;

}

body::after{

content:"";

position:fixed;

bottom:-250px;
left:-250px;

width:500px;
height:500px;

background:rgba(0,255,153,0.05);

border-radius:50%;

z-index:-1;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:20px;

margin-bottom:40px;

}

.logo{

font-size:52px;

font-weight:800;

color:white;

}

.logo span{

color:#00ff99;

text-shadow:0 0 25px #00ff99;

}

.logout{

padding:16px 28px;

background:#ef4444;

color:white;

text-decoration:none;

font-weight:700;

border-radius:50px;

box-shadow:0 0 25px rgba(239,68,68,0.4);

transition:0.3s;

}

.logout:hover{

transform:translateY(-5px);

}

/* TITLE */

.title{

font-size:42px;

font-weight:800;

margin-bottom:10px;

}

.subtitle{

color:#94a3b8;

font-size:18px;

margin-bottom:45px;

}

/* USERS GRID */

.users{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(380px,1fr));

gap:30px;

}

/* CARD */

.card{

background:#071226;

padding:30px;

border-radius:35px;

border:1px solid rgba(0,255,153,0.08);

position:relative;

overflow:hidden;

transition:0.3s;

}

.card:hover{

transform:translateY(-8px);

box-shadow:0 0 35px rgba(0,255,153,0.15);

}

.card::before{

content:"";

position:absolute;

top:-90px;
right:-90px;

width:220px;
height:220px;

background:rgba(0,255,153,0.05);

border-radius:50%;

}

/* USERNAME */

.card h2{

font-size:28px;

margin-bottom:15px;

position:relative;
z-index:2;

}

/* INFO */

.card p{

margin:12px 0;

color:#cbd5e1;

font-size:16px;

line-height:1.7;

position:relative;
z-index:2;

word-break:break-word;

}

/* STATUS */

.active{

color:#00ff99;

font-weight:800;

}

.pending{

color:#ffcc00;

font-weight:800;

}

.breached{

color:#ef4444;

font-weight:800;

}

/* INPUT */

.input{

width:100%;

padding:16px;

margin-top:15px;

border:none;

outline:none;

border-radius:16px;

background:#0f172a;

color:white;

font-size:16px;

border:1px solid rgba(255,255,255,0.05);

}

/* BUTTON */

.btn{

width:100%;

padding:18px;

margin-top:18px;

border:none;

border-radius:18px;

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

font-size:16px;

font-weight:800;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 25px rgba(0,255,153,0.25);

position:relative;
z-index:2;

}

.btn:hover{

transform:translateY(-5px);

box-shadow:0 0 40px rgba(0,255,153,0.6);

}

/* MOBILE */

@media(max-width:768px){

body{

padding:20px;

}

.logo{

font-size:40px;

}

.title{

font-size:32px;

}

.subtitle{

font-size:16px;

}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">
PURE<span>Step</span>
</div>

<a href="login.html" class="logout">

Logout

</a>

</div>

<!-- TITLE -->

<h1 class="title">

Secure Admin Dashboard 🚀

</h1>

<p class="subtitle">

Manage traders, approve funded accounts and create MT5 accounts automatically.

</p>

<!-- USERS -->

<div class="users" id="users-container">

</div>

<!-- FIREBASE -->

<script type="module">

import { auth, db } from "./firebase.js";

import {

onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

collection,
getDocs,
doc,
updateDoc,
addDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ADMIN PROTECTION */

onAuthStateChanged(auth,(user)=>{

if(user){

const adminEmail =
"purestepfunding@gmail.com";

const adminKey =
prompt("Enter Admin Secret Key");

/* CHECK */

if(

user.email !== adminEmail

||

adminKey !== "PURESTEPYASSINE2026"

){

alert("Access Denied");

window.location.href =
"dashboard.html";

}

/* ACCESS */

else{

loadUsers();

}

}

/* NO LOGIN */

else{

window.location.href =
"login.html";

}

});

/* USERS CONTAINER */

const container =

document.getElementById("users-container");

/* LOAD USERS */

async function loadUsers(){

const querySnapshot =

await getDocs(collection(db,"users"));

container.innerHTML = "";

/* LOOP */

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

const uid = docSnap.id;

/* STATUS */

let statusClass = "pending";

if(data.status === "ACTIVE"){

statusClass = "active";

}

if(data.status === "BREACHED"){

statusClass = "breached";

}

/* CARD */

container.innerHTML += `

<div class="card">

<h2>
${data.username || "Trader"}
</h2>

<p>
📧 ${data.email || "No Email"}
</p>

<p>
🆔 UID:
<b>${uid}</b>
</p>

<p>
📌 Status:
<b class="${statusClass}">
${data.status || "PENDING"}
</b>
</p>

<p>
🛒 Pending Plan:
<b>${data.pendingPlan || "None"}
</b>
</p>

<p>
📷 Instagram:
<b>${data.instagram || "None"}
</b>
</p>

<p>
🧾 Transaction ID:
<b>${data.transactionID || "None"}
</b>
</p>

<input
type="number"
placeholder="Balance Example 10000"
class="input"
id="balance-${uid}">

<input
type="text"
placeholder="Challenge Type Example 10K Account"
class="input"
id="type-${uid}">

<button
class="btn"
onclick="approveUser(
'${uid}'
)">

APPROVE ACCOUNT

</button>

</div>

`;

});

}

/* APPROVE */

window.approveUser = async function(uid){

const balance =

document.getElementById(
`balance-${uid}`
).value;

const type =

document.getElementById(
`type-${uid}`
).value;

/* VALIDATION */

if(!balance || !type){

alert(
"Fill Balance And Challenge Type"
);

return;

}

/* MT5 */

const mt5Login =
Math.floor(
100000 + Math.random() * 900000
);

const mt5Password =
"PureStep" +
Math.floor(
1000 + Math.random() * 9000
);

/* CREATE ACCOUNT */

await addDoc(
collection(db,"accounts"),
{

uid: uid,

accountSize: type,

balance: Number(balance),

profit: 0,

status: "ACTIVE",

phase: "STEP 1",

dailyDrawdown: "4%",

maxDrawdown: "8%",

mt5Login: mt5Login,

mt5Password: mt5Password,

mt5Server: "PureStep-Live",

platform: "MetaTrader 5",

createdAt: Date.now()

}
);

/* UPDATE USER */

await updateDoc(
doc(db,"users",uid),
{

status:"ACTIVE"

}
);

alert(
"Account Approved Successfully 🚀"
);

loadUsers();

};

</script>

</body>

</html>
