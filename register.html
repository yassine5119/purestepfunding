<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PURESTEP REGISTER</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#020617;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:20px;

overflow:hidden;

position:relative;

}

/* BACKGROUND */

body::before{

content:"";

position:absolute;

top:-250px;
right:-250px;

width:500px;
height:500px;

background:rgba(0,255,153,0.08);

border-radius:50%;

}

body::after{

content:"";

position:absolute;

bottom:-250px;
left:-250px;

width:500px;
height:500px;

background:rgba(0,255,153,0.08);

border-radius:50%;

}

/* REGISTER BOX */

.register-box{

width:100%;
max-width:520px;

background:#071226;

padding:50px 40px;

border-radius:35px;

border:1px solid rgba(0,255,153,0.1);

position:relative;

overflow:hidden;

z-index:2;

box-shadow:0 0 40px rgba(0,255,153,0.08);

}

.register-box::before{

content:"";

position:absolute;

top:-120px;
right:-120px;

width:240px;
height:240px;

background:rgba(0,255,153,0.06);

border-radius:50%;

}

/* LOGO */

.logo{

text-align:center;

font-size:48px;

font-weight:800;

margin-bottom:15px;

position:relative;
z-index:2;

}

.logo span{

color:#00ff99;

text-shadow:0 0 25px #00ff99;

}

/* SUBTITLE */

.subtitle{

text-align:center;

font-size:18px;

color:#cbd5e1;

margin-bottom:40px;

line-height:1.7;

position:relative;
z-index:2;

}

/* INPUTS */

.input-group{

margin-bottom:24px;

position:relative;
z-index:2;

}

.input-group label{

display:block;

margin-bottom:10px;

font-weight:600;

color:#cbd5e1;

}

.input-group input{

width:100%;

padding:17px;

border:none;
outline:none;

background:#0f172a;

border-radius:18px;

color:white;

font-size:16px;

border:1px solid rgba(255,255,255,0.06);

transition:0.3s;

}

.input-group input:focus{

border:1px solid #00ff99;

box-shadow:0 0 20px rgba(0,255,153,0.2);

}

/* BUTTON */

.register-btn{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

font-size:18px;

font-weight:800;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 25px rgba(0,255,153,0.35);

position:relative;
z-index:2;

}

.register-btn:hover{

transform:translateY(-5px);

box-shadow:0 0 40px rgba(0,255,153,0.7);

}

/* MESSAGE */

.message{

margin-top:25px;

padding:18px;

border-radius:16px;

font-weight:700;

display:none;

position:relative;
z-index:2;

}

.success{

background:#00ff99;

color:black;

}

.error{

background:#ef4444;

color:white;

}

/* LOGIN */

.login{

text-align:center;

margin-top:30px;

color:#cbd5e1;

position:relative;
z-index:2;

}

.login a{

color:#00ff99;

text-decoration:none;

font-weight:700;

}

/* SUPPORT */

.support-btn{

position:fixed;

bottom:25px;
right:25px;

padding:18px 28px;

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

font-weight:700;

border-radius:50px;

text-decoration:none;

box-shadow:0 0 25px rgba(0,255,153,0.5);

z-index:9999;

transition:0.3s;

animation:pulse 2s infinite;

}

.support-btn:hover{

transform:translateY(-5px);

box-shadow:0 0 40px rgba(0,255,153,0.8);

}

@keyframes pulse{

0%{
box-shadow:0 0 15px rgba(0,255,153,0.4);
}

50%{
box-shadow:0 0 35px rgba(0,255,153,0.8);
}

100%{
box-shadow:0 0 15px rgba(0,255,153,0.4);
}

}

/* MOBILE */

@media(max-width:600px){

.register-box{

padding:40px 25px;

}

.logo{

font-size:40px;

}

.subtitle{

font-size:16px;

}

}

</style>

</head>

<body>

<!-- REGISTER BOX -->

<div class="register-box">

<div class="logo">
PURE<span>Step</span>
</div>

<p class="subtitle">

Create your PureStep trader account and start your funded journey today.

</p>

<!-- USERNAME -->

<div class="input-group">

<label>
Username
</label>

<input type="text" id="username" placeholder="Enter username">

</div>

<!-- EMAIL -->

<div class="input-group">

<label>
Email Address
</label>

<input type="email" id="email" placeholder="Enter your email">

</div>

<!-- PASSWORD -->

<div class="input-group">

<label>
Password
</label>

<input type="password" id="password" placeholder="Create password">

</div>

<!-- BUTTON -->

<button class="register-btn" onclick="registerUser()">

CREATE ACCOUNT

</button>

<!-- SUCCESS -->

<div class="message success" id="success-message">

Account Created Successfully 🚀

</div>

<!-- ERROR -->

<div class="message error" id="error-message">

Registration Failed

</div>

<!-- LOGIN -->

<div class="login">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

<!-- SUPPORT -->

<a href="https://instagram.com/purestepfunding"
target="_blank"
class="support-btn">

Support

</a>

<!-- FIREBASE -->

<script type="module">

import { auth, db } from "./firebase.js";

import {

createUserWithEmailAndPassword

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

doc,
setDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* REGISTER */

window.registerUser = async function(){

const username =
document.getElementById("username").value;

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const success =
document.getElementById("success-message");

const error =
document.getElementById("error-message");

success.style.display = "none";

error.style.display = "none";

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user =
userCredential.user;

/* SAVE USER */

await setDoc(doc(db,"users",user.uid),{

username: username,

email: email,

balance: 0,

profit: 0,

status: "ACTIVE",

phase: "Phase 1",

accountType: "No Challenge Yet",

createdAt: new Date()

});

/* LOCAL STORAGE */

localStorage.setItem(
"loggedIn",
"true"
);

localStorage.setItem(
"userName",
username
);

localStorage.setItem(
"userEmail",
email
);

success.style.display = "block";

setTimeout(() => {

window.location.href =
"dashboard.html";

},1500);

}

catch(err){

error.style.display = "block";

console.log(err);

}

};

</script>

</body>

</html>
