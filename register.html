<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PURESTEP REGISTER</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#020617;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow:hidden;

position:relative;

}

/* ===== BACKGROUND ===== */

body::before{

content:"";

position:absolute;

top:-200px;
right:-200px;

width:450px;
height:450px;

background:rgba(0,255,153,0.08);

border-radius:50%;

filter:blur(20px);

}

body::after{

content:"";

position:absolute;

bottom:-200px;
left:-200px;

width:450px;
height:450px;

background:rgba(0,255,153,0.08);

border-radius:50%;

filter:blur(20px);

}

/* ===== REGISTER BOX ===== */

.register-box{

width:100%;
max-width:500px;

background:#071226;

padding:45px 30px;

border-radius:30px;

border:1px solid rgba(0,255,153,0.1);

box-shadow:0 0 30px rgba(0,255,153,0.1);

position:relative;

z-index:2;

overflow:hidden;

backdrop-filter:blur(12px);

}

.register-box::before{

content:"";

position:absolute;

top:-100px;
right:-100px;

width:220px;
height:220px;

background:rgba(0,255,153,0.05);

border-radius:50%;

}

/* ===== LOGO ===== */

.logo{

text-align:center;

font-size:52px;

font-weight:800;

color:white;

margin-bottom:10px;

position:relative;
z-index:2;

}

.logo span{

color:#00ff99;

text-shadow:0 0 25px #00ff99;

}

/* ===== SUBTITLE ===== */

.subtitle{

text-align:center;

color:#cbd5e1;

font-size:17px;

line-height:1.7;

margin-bottom:35px;

position:relative;
z-index:2;

}

/* ===== INPUTS ===== */

.input-group{

margin-bottom:22px;

position:relative;
z-index:2;

}

.input-group label{

display:block;

margin-bottom:10px;

font-weight:600;

color:white;

}

.input-group input{

width:100%;

padding:16px;

border:none;

outline:none;

border-radius:16px;

background:#0f172a;

color:white;

font-size:16px;

border:1px solid rgba(255,255,255,0.05);

transition:0.3s;

}

.input-group input:focus{

border:1px solid #00ff99;

box-shadow:0 0 20px rgba(0,255,153,0.25);

}

/* ===== BUTTON ===== */

.register-btn{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:linear-gradient(135deg,#00ff99,#00d97f);

color:black;

font-size:18px;

font-weight:800;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 25px rgba(0,255,153,0.35);

position:relative;
z-index:2;

}

.register-btn:hover{

transform:translateY(-5px);

box-shadow:0 0 40px rgba(0,255,153,0.7);

}

/* ===== MESSAGE ===== */

.message{

margin-top:20px;

padding:16px;

border-radius:14px;

font-weight:700;

display:none;

position:relative;
z-index:2;

text-align:center;

}

.success{

background:#00ff99;

color:black;

}

.error{

background:#ef4444;

color:white;

}

/* ===== LOGIN ===== */

.login{

text-align:center;

margin-top:25px;

color:#cbd5e1;

position:relative;
z-index:2;

}

.login a{

color:#00ff99;

text-decoration:none;

font-weight:700;

}

/* ===== SUPPORT ===== */

.support-btn{

position:fixed;

bottom:20px;
right:20px;

padding:14px 22px;

background:linear-gradient(135deg,#00ff99,#00d97f);

color:black;

font-weight:700;

border-radius:50px;

text-decoration:none;

box-shadow:0 0 25px rgba(0,255,153,0.5);

z-index:999;

}

/* ===== MOBILE ===== */

@media(max-width:600px){

.logo{
font-size:42px;
}

.register-box{
padding:35px 22px;
}

.subtitle{
font-size:15px;
}

.input-group input{
padding:15px;
font-size:15px;
}

.register-btn{
padding:16px;
font-size:16px;
}

.support-btn{

bottom:12px;
right:12px;

padding:12px 18px;

font-size:13px;

}

}

</style>

</head>

<body>

<div class="register-box">

<div class="logo">
PURE<span>Step</span>
</div>

<p class="subtitle">

Create your PureStep trader account and start your funded journey today.

</p>

<!-- USERNAME -->

<div class="input-group">

<label>
Username
</label>

<input type="text"
id="username"
placeholder="Enter your username">

</div>

<!-- EMAIL -->

<div class="input-group">

<label>
Email Address
</label>

<input type="email"
id="email"
placeholder="Enter your email">

</div>

<!-- PASSWORD -->

<div class="input-group">

<label>
Password
</label>

<input type="password"
id="password"
placeholder="Create password">

</div>

<!-- BUTTON -->

<button class="register-btn"
onclick="registerUser()">

CREATE ACCOUNT

</button>

<!-- SUCCESS -->

<div class="message success"
id="success-message">

Account Created Successfully 🚀

</div>

<!-- ERROR -->

<div class="message error"
id="error-message">

Registration Failed

</div>

<!-- LOGIN -->

<div class="login">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

<!-- SUPPORT -->

<a href="https://instagram.com/purestepfunding"
target="_blank"
class="support-btn">

💬 Support

</a>

<!-- FIREBASE -->

<script type="module">

import { auth, db } from "./firebase.js";

import {

createUserWithEmailAndPassword

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

doc,
setDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===== REGISTER ===== */

window.registerUser = async function(){

const username =
document.getElementById("username").value;

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const success =
document.getElementById("success-message");

const error =
document.getElementById("error-message");

/* ===== RESET ===== */

success.style.display = "none";

error.style.display = "none";

/* ===== VALIDATION ===== */

if(username === "" || email === "" || password === ""){

error.innerHTML =
"Please fill all fields";

error.style.display =
"block";

return;

}

try{

/* ===== CREATE USER ===== */

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user =
userCredential.user;

/* ===== SAVE USER DATA ===== */

await setDoc(doc(db,"users",user.uid),{

uid: user.uid,

username: username,

email: email,

balance: 0,

profit: 0,

equity: 0,

dailyDrawdown: "0%",

maxDrawdown: "0%",

status: "Inactive",

phase: "None",

accountType: "No Challenge",

pendingPlan: "",

paymentProof: "",

instagram: "",

payoutEligible: false,

createdAt: Date.now()

});

/* ===== LOCAL STORAGE ===== */

localStorage.setItem(
"loggedIn",
"true"
);

localStorage.setItem(
"userName",
username
);

localStorage.setItem(
"userEmail",
email
);

/* ===== SUCCESS ===== */

success.style.display =
"block";

/* ===== REDIRECT ===== */

setTimeout(() => {

window.location.href =
"dashboard.html";

},1500);

}

catch(err){

console.log(err);

error.innerHTML =
err.message;

error.style.display =
"block";

}

};

</script>

</body>

</html>
