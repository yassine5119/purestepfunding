<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - PureStep Funding</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(2,8,23,0.92),rgba(2,8,23,0.95)),
url('https://images.unsplash.com/photo-1642790106117-e829e14a795f?q=80&w=1920&auto=format&fit=crop');

background-size:cover;
background-position:center;

}

.box{

width:430px;
padding:50px;

background:rgba(8,18,37,0.92);

border:1px solid rgba(0,255,153,0.18);

border-radius:30px;

backdrop-filter:blur(15px);

box-shadow:0 0 45px rgba(0,255,153,0.2);

text-align:center;

}

.logo{

font-size:42px;
font-weight:800;
margin-bottom:20px;
color:#00ff99;

text-shadow:0 0 20px #00ff99;

}

.logo span{
color:#2d7cff;
}

h1{

font-size:40px;
margin-bottom:35px;
color:white;

}

.input-box{

margin-bottom:22px;

}

.input-box input{

width:100%;
padding:18px;

border:none;
outline:none;

border-radius:15px;

background:#020817;

color:white;

font-size:16px;

}

.btn{

width:100%;

padding:18px;

border:none;

border-radius:15px;

background:#00ff99;

font-size:18px;

font-weight:700;

cursor:pointer;

box-shadow:0 0 30px #00ff99;

}

.bottom{

margin-top:25px;
color:#cbd5e1;

}

.bottom a{

color:#00ff99;
text-decoration:none;
font-weight:700;

}

</style>

</head>

<body>

<div class="box">

<div class="logo">
<span>PURE</span>Step
</div>

<h1>Create Account</h1>

<div class="input-box">
<input type="email" id="email" placeholder="Email">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password">
</div>

<button class="btn" onclick="register()">
REGISTER
</button>

<div class="bottom">
Already have account?
<a href="login.html">Login</a>
</div>

</div>

<script>

function register(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(email === "" || password === ""){

alert("Fill all fields");

}else{

localStorage.setItem("email", email);
localStorage.setItem("password", password);

alert("Account Created Successfully");

window.location.href = "login.html";

}

}

</script>

</body>

</html>
