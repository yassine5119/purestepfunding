<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Account Card Style */
        .account-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; margin-bottom: 20px; overflow: hidden; transition: 0.3s; }
        .card-header { padding: 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #0d1117; }
        .card-header:hover { background: #161b22; }
        
        /* Body Details */
        .card-body { padding: 30px; display: none; border-top: 1px solid #30363d; }
        
        /* Stats Grid */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: #0d1117; padding: 15px; border-radius: 8px; border: 1px solid #30363d; }
        
        /* Progress */
        .progress-container { margin: 20px 0; }
        .progress-bar { height: 8px; background: #0d1117; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #238636; }
        
        /* Buttons */
        .btn { padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 600; cursor: pointer; border: none; display: inline-block; font-size: 14px; }
        .btn-green { background: #238636; color: white; }
        .btn-gray { background: #30363d; color: white; margin-left: 10px; }
        .btn-disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }
        
        /* Status Badges */
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-active { background: #1a3a2a; color: #238636; }
        .status-breached { background: #3d2222; color: #da3633; }
        
        .empty-state { text-align: center; padding: 100px 20px; border: 2px dashed #30363d; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dashboard</h1>
    <div id="accounts-list">
        <div id="empty-view" class="empty-state">
            <h2>No active accounts</h2>
            <p>Purchase a challenge to get started.</p>
            <br>
            <a href="challenge.html" class="btn btn-green">View Challenges</a>
        </div>
    </div>
</div>

<script type="module">
    import { auth, db } from "./firebase.js";
    import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
        if (!user) { window.location.href = "login.html"; return; }

        const list = document.getElementById("accounts-list");
        const emptyView = document.getElementById("empty-view");

        onSnapshot(collection(db, "users", user.uid, "accounts"), (snapshot) => {
            if (snapshot.empty) {
                emptyView.style.display = "block";
                list.innerHTML = "";
                list.appendChild(emptyView);
            } else {
                emptyView.style.display = "none";
                list.innerHTML = "";
                snapshot.forEach((doc) => {
                    const d = doc.data();
                    const id = doc.id;
                    const isActive = d.status === 'Active';
                    
                    list.innerHTML += `
                        <div class="account-card">
                            <div class="card-header" onclick="toggle('${id}')">
                                <div><h3 style="margin:0">${d.plan}</h3></div>
                                <div><span class="status-badge ${isActive ? 'status-active' : 'status-breached'}">${d.status}</span></div>
                            </div>
                            <div class="card-body" id="body-${id}">
                                <div class="stats-row">
                                    <div class="stat-box"><small>Login</small><h4>${d.mt5Login}</h4></div>
                                    <div class="stat-box"><small>Balance</small><h4>$${d.balance}</h4></div>
                                </div>
                                <div class="progress-container">
                                    <div style="display:flex; justify-content:space-between"><span>Profit Target Progress</span><span>${d.progress}%</span></div>
                                    <div class="progress-bar"><div class="progress-fill" style="width:${d.progress}%"></div></div>
                                </div>
                                <div style="margin-top:20px;">
                                    ${isActive ? 
                                        `<a href="payout.html" class="btn btn-green">Request Payout</a>` : 
                                        `<button class="btn btn-disabled">Payout Locked</button>`
                                    }
                                    <a href="certificate.html" class="btn btn-gray">View Certificate</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
        });
    });

    window.toggle = (id) => {
        const body = document.getElementById(`body-${id}`);
        body.style.display = (body.style.display === "block") ? "none" : "block";
    };
</script>

</body>
</html>
