<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#020617;
color:white;
display:flex;
overflow-x:hidden;
position:relative;

}

/* ===== PARTICLES ===== */

.particles{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

overflow:hidden;

z-index:-5;

pointer-events:none;

}

.particles span{

position:absolute;

display:block;

border-radius:50%;

background:rgba(0,255,153,0.08);

animation:particles 25s linear infinite;

bottom:-150px;

}

.particles span:nth-child(1){

left:10%;
width:80px;
height:80px;
animation-duration:18s;

}

.particles span:nth-child(2){

left:25%;
width:140px;
height:140px;
animation-duration:22s;

}

.particles span:nth-child(3){

left:40%;
width:60px;
height:60px;
animation-duration:16s;

}

.particles span:nth-child(4){

left:60%;
width:170px;
height:170px;
animation-duration:26s;

}

.particles span:nth-child(5){

left:75%;
width:100px;
height:100px;
animation-duration:20s;

}

.particles span:nth-child(6){

left:90%;
width:70px;
height:70px;
animation-duration:14s;

}

@keyframes particles{

0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(-1200px) rotate(720deg);
opacity:0;
}

}

/* ===== CURSOR GLOW ===== */

.cursor-glow{

position:fixed;

width:300px;
height:300px;

background:rgba(0,255,153,0.08);

border-radius:50%;

filter:blur(90px);

pointer-events:none;

z-index:-1;

transform:translate(-50%,-50%);

}

/* ===== SIDEBAR ===== */

.sidebar{

width:290px;

height:100vh;

background:rgba(7,18,38,0.92);

backdrop-filter:blur(15px);

position:fixed;

padding:30px 20px;

border-right:1px solid rgba(255,255,255,0.05);

overflow-y:auto;

animation:sidebarSlide 1s ease;

}

@keyframes sidebarSlide{

0%{
transform:translateX(-100px);
opacity:0;
}

100%{
transform:translateX(0);
opacity:1;
}

}

.logo{

font-size:42px;

font-weight:800;

text-align:center;

margin-bottom:50px;

}

.logo span{

color:#00ff99;

text-shadow:0 0 25px #00ff99;

}

.sidebar-links{

list-style:none;

}

.sidebar-links li{

margin-bottom:18px;

}

.sidebar-links a{

display:flex;

align-items:center;

gap:14px;

padding:18px 20px;

border-radius:18px;

background:rgba(15,23,42,0.88);

text-decoration:none;

color:white;

font-weight:600;

transition:0.3s;

position:relative;

overflow:hidden;

}

.sidebar-links a:hover{

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

transform:translateX(8px);

box-shadow:0 0 35px rgba(0,255,153,0.4);

}

/* ===== MAIN ===== */

.main{

margin-left:290px;

width:100%;

padding:35px;

}

/* ===== TOPBAR ===== */

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:20px;

margin-bottom:35px;

background:rgba(7,18,38,0.75);

padding:25px;

border-radius:30px;

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.05);

}

.welcome h1{

font-size:46px;

margin-bottom:8px;

}

.welcome p{

color:#94a3b8;

}

.user-card{

display:flex;

align-items:center;

gap:15px;

background:rgba(15,23,42,0.88);

padding:16px 22px;

border-radius:20px;

transition:0.3s;

max-width:100%;

overflow:hidden;

}

.user-card:hover{

transform:translateY(-5px);

box-shadow:0 0 30px rgba(0,255,153,0.2);

}

.user-card div{

overflow:hidden;

}

.user-card h3{

white-space:nowrap;

overflow:hidden;

text-overflow:ellipsis;

max-width:180px;

font-size:18px;

}

.avatar{

width:55px;
height:55px;

border-radius:50%;

background:linear-gradient(135deg,#00ff99,#00c97a);

display:flex;

align-items:center;
justify-content:center;

font-size:22px;

font-weight:800;

color:black;

}

/* ===== OVERVIEW ===== */

.overview{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(230px,1fr));

gap:25px;

margin-bottom:35px;

}

.overview-card{

background:rgba(7,18,38,0.88);

padding:24px;

border-radius:28px;

transition:0.3s;

position:relative;

overflow:hidden;

animation:
cardReveal 1s ease,
floatCard 5s ease-in-out infinite;

}

@keyframes cardReveal{

0%{
opacity:0;
transform:translateY(50px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

@keyframes floatCard{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0px);
}

}

.overview-card::before{

content:"";

position:absolute;

top:-60px;
right:-60px;

width:180px;
height:180px;

background:rgba(0,255,153,0.05);

border-radius:50%;

}

.overview-card:hover{

transform:translateY(-10px) scale(1.03);

box-shadow:0 0 45px rgba(0,255,153,0.2);

}

.overview-card h2{

font-size:42px;

color:#00ff99;

margin-bottom:10px;

}

.overview-card p{

color:#94a3b8;

}

/* ===== MAIN GRID ===== */

.main-grid{

display:grid;

grid-template-columns:2fr 1fr;

gap:30px;

margin-bottom:35px;

}

/* ===== ACCOUNT BOX ===== */

.account-box,
.quick-actions,
.progress-section,
.certificate{

background:rgba(7,18,38,0.88);

padding:30px;

border-radius:30px;

}

.account-header{

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:20px;

margin-bottom:30px;

}

.account-header h2{

font-size:34px;

}

.account-status{

padding:12px 22px;

border-radius:50px;

font-weight:800;

background:#00ff99;

color:black;

}

.account-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:22px;

}

.account-item{

background:rgba(15,23,42,0.85);

padding:24px;

border-radius:22px;

transition:0.3s;

}

.account-item:hover{

transform:translateY(-6px);

box-shadow:0 0 25px rgba(0,255,153,0.15);

}

.account-item h3{

font-size:16px;

color:#00ff99;

margin-bottom:10px;

}

.account-item p{

font-size:24px;

font-weight:700;

}

/* ===== QUICK ACTIONS ===== */

.quick-actions h2,
.progress-section h2{

font-size:32px;

margin-bottom:25px;

}

.quick-btn{

display:block;

width:100%;

padding:18px;

margin-bottom:18px;

border-radius:18px;

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

text-align:center;

font-weight:800;

text-decoration:none;

transition:0.3s;

}

.quick-btn:hover{

transform:translateY(-5px);

box-shadow:0 0 45px rgba(0,255,153,0.5);

}

/* ===== PROGRESS ===== */

.progress-bar{

width:100%;

height:22px;

background:#0f172a;

border-radius:50px;

overflow:hidden;

}

.progress-fill{

height:100%;

width:45%;

background:linear-gradient(
90deg,
#00ff99,
#00c97a,
#00ff99
);

background-size:200% 100%;

animation:
progressAnim 3s infinite alternate,
gradientMove 4s linear infinite;

border-radius:50px;

}

@keyframes progressAnim{

0%{
width:35%;
}

100%{
width:55%;
}

}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}

}

/* ===== CERTIFICATE ===== */

.certificate{

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

}

.certificate h2{

font-size:42px;

margin-bottom:15px;

font-weight:800;

}

.certificate p{

font-size:18px;

margin-bottom:25px;

line-height:1.8;

}

.certificate a{

display:inline-block;

padding:16px 28px;

background:black;

color:#00ff99;

font-weight:800;

border-radius:18px;

text-decoration:none;

}

/* ===== SUPPORT ===== */

.support-btn{

position:fixed;

bottom:20px;
right:20px;

padding:14px 20px;

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

font-weight:700;

border-radius:18px;

text-decoration:none;

z-index:9999;

}

/* ===== MOBILE ===== */

@media(max-width:1000px){

.main-grid{
grid-template-columns:1fr;
}

}

@media(max-width:850px){

.sidebar{
display:none;
}

.main{
margin-left:0;
padding:16px;
}

.topbar{

padding:20px;

border-radius:25px;

}

.welcome h1{

font-size:30px;

line-height:1.1;

}

.welcome p{

font-size:16px;

line-height:1.6;

}

.account-box,
.quick-actions,
.progress-section,
.certificate{

padding:24px;

border-radius:28px;

}

.account-header h2{

font-size:26px;

}

.quick-actions h2,
.progress-section h2{

font-size:28px;

}

.quick-btn{

padding:16px;

font-size:16px;

}

.certificate h2{

font-size:32px;

}

.certificate p{

font-size:16px;

}

}

</style>
