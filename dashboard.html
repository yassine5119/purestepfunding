<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PURESTEP PREMIUM DASHBOARD</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{

background:#020617;
color:white;
display:flex;
overflow-x:hidden;
position:relative;

}

/* ========================================= */
/* PARTICLES */
/* ========================================= */

.particles{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

overflow:hidden;

z-index:-5;

pointer-events:none;

}

.particles span{

position:absolute;

display:block;

border-radius:50%;

background:rgba(0,255,153,0.08);

animation:particles 25s linear infinite;

bottom:-150px;

}

.particles span:nth-child(1){

left:10%;

width:80px;
height:80px;

animation-duration:18s;

}

.particles span:nth-child(2){

left:25%;

width:140px;
height:140px;

animation-duration:24s;

}

.particles span:nth-child(3){

left:40%;

width:60px;
height:60px;

animation-duration:16s;

}

.particles span:nth-child(4){

left:60%;

width:170px;
height:170px;

animation-duration:26s;

}

.particles span:nth-child(5){

left:75%;

width:100px;
height:100px;

animation-duration:20s;

}

.particles span:nth-child(6){

left:90%;

width:70px;
height:70px;

animation-duration:14s;

}

@keyframes particles{

0%{

transform:translateY(0) rotate(0deg);

opacity:0;

}

10%{

opacity:1;

}

100%{

transform:translateY(-1200px) rotate(720deg);

opacity:0;

}

}

/* ========================================= */
/* CURSOR GLOW */
/* ========================================= */

.cursor-glow{

position:fixed;

width:320px;
height:320px;

background:rgba(0,255,153,0.08);

border-radius:50%;

filter:blur(95px);

pointer-events:none;

z-index:-1;

transform:translate(-50%,-50%);

}

/* PREMIUM BACKGROUND */

body::before{

content:"";

position:fixed;

top:-250px;
left:-250px;

width:500px;
height:500px;

background:rgba(0,255,153,0.07);

filter:blur(120px);

border-radius:50%;

z-index:-2;

animation:glowMove 7s infinite alternate;

}

body::after{

content:"";

position:fixed;

bottom:-250px;
right:-250px;

width:500px;
height:500px;

background:rgba(0,255,153,0.05);

filter:blur(120px);

border-radius:50%;

z-index:-2;

animation:glowMove 8s infinite alternate;

}

@keyframes glowMove{

0%{
transform:translateY(0px);
}

100%{
transform:translateY(50px);
}

}

/* ========================================= */
/* SIDEBAR */
/* ========================================= */

.sidebar{

width:290px;

height:100vh;

background:rgba(7,18,38,0.92);

backdrop-filter:blur(16px);

position:fixed;

padding:30px 20px;

border-right:1px solid rgba(0,255,153,0.08);

overflow-y:auto;

z-index:1000;

box-shadow:
0 0 45px rgba(0,0,0,0.45);

animation:sidebarSlide 1s ease;

}

@keyframes sidebarSlide{

0%{

transform:translateX(-100px);

opacity:0;

}

100%{

transform:translateX(0);

opacity:1;

}

}

/* ========================================= */
/* LOGO */
/* ========================================= */

.logo{

font-size:42px;

font-weight:800;

text-align:center;

margin-bottom:50px;

color:white;

}

.logo span{

color:#00ff99;

animation:logoGlow 3s infinite;

}

@keyframes logoGlow{

0%{
text-shadow:0 0 15px #00ff99;
}

50%{
text-shadow:
0 0 35px #00ff99,
0 0 60px #00ff99;
}

100%{
text-shadow:0 0 15px #00ff99;
}

}

/* ========================================= */
/* SIDEBAR LINKS */
/* ========================================= */

.sidebar-links{

list-style:none;

}

.sidebar-links li{

margin-bottom:18px;

}

.sidebar-links a{

display:flex;

align-items:center;

gap:14px;

padding:17px 20px;

background:rgba(15,23,42,0.85);

border-radius:18px;

text-decoration:none;

color:white;

font-weight:600;

transition:0.3s;

position:relative;

overflow:hidden;

}

.sidebar-links a::before{

content:"";

position:absolute;

top:0;
left:-120%;

width:100%;
height:100%;

background:rgba(255,255,255,0.12);

transform:skewX(-20deg);

transition:0.6s;

}

.sidebar-links a:hover::before{

left:120%;

}

.sidebar-links a:hover{

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

transform:translateX(8px);

box-shadow:0 0 35px rgba(0,255,153,0.45);

}

/* ========================================= */
/* MAIN */
/* ========================================= */

.main{

margin-left:290px;

width:100%;

padding:35px;

}

/* ========================================= */
/* TOPBAR */
/* ========================================= */

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:20px;

margin-bottom:35px;

background:rgba(7,18,38,0.75);

padding:25px;

border-radius:30px;

backdrop-filter:blur(10px);

border:1px solid rgba(0,255,153,0.08);

box-shadow:0 0 35px rgba(0,255,153,0.08);

animation:topReveal 1s ease;

}

@keyframes topReveal{

0%{
opacity:0;
transform:translateY(-40px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

.welcome h1{

font-size:46px;

margin-bottom:8px;

font-weight:800;

}

.welcome p{

color:#94a3b8;

font-size:17px;

}

/* ========================================= */
/* USER CARD */
/* ========================================= */

.user-card{

background:rgba(15,23,42,0.85);

padding:18px 24px;

border-radius:20px;

border:1px solid rgba(0,255,153,0.08);

display:flex;

align-items:center;

gap:15px;

backdrop-filter:blur(10px);

transition:0.3s;

}

.user-card:hover{

transform:translateY(-5px);

box-shadow:0 0 30px rgba(0,255,153,0.2);

}

.avatar{

width:55px;
height:55px;

border-radius:50%;

background:linear-gradient(135deg,#00ff99,#00c97a);

display:flex;
align-items:center;
justify-content:center;

font-size:22px;

font-weight:800;

color:black;

box-shadow:0 0 30px rgba(0,255,153,0.6);

}

/* ========================================= */
/* OVERVIEW */
/* ========================================= */

.overview{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(230px,1fr));

gap:25px;

margin-bottom:35px;

}

.overview-card{

background:rgba(7,18,38,0.88);

padding:30px;

border-radius:30px;

position:relative;

overflow:hidden;

transition:0.3s;

backdrop-filter:blur(12px);

animation:cardReveal 1s ease;

}

.overview-card:hover{

transform:translateY(-10px) scale(1.03);

box-shadow:
0 0 25px rgba(0,255,153,0.2),
0 0 60px rgba(0,255,153,0.12);

}

@keyframes cardReveal{

0%{
opacity:0;
transform:translateY(50px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

.overview-card::before{

content:"";

position:absolute;

top:-60px;
right:-60px;

width:180px;
height:180px;

background:rgba(0,255,153,0.05);

border-radius:50%;

}

.overview-card h2{

font-size:42px;

margin-bottom:10px;

color:#00ff99;

position:relative;
z-index:2;

}

.overview-card p{

color:#94a3b8;

position:relative;
z-index:2;

}

/* ========================================= */
/* MAIN GRID */
/* ========================================= */

.main-grid{

display:grid;

grid-template-columns:2fr 1fr;

gap:30px;

margin-bottom:35px;

}

/* ========================================= */
/* ACCOUNT BOX */
/* ========================================= */

.account-box,
.quick-actions,
.progress-section,
.certificate{

animation:cardReveal 1.2s ease;

}

.account-box{

background:rgba(7,18,38,0.88);

padding:35px;

border-radius:35px;

backdrop-filter:blur(12px);

}

.account-header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

flex-wrap:wrap;

gap:20px;

}

.account-header h2{

font-size:34px;

}

.account-status{

padding:12px 22px;

border-radius:50px;

font-weight:800;

background:#00ff99;

color:black;

box-shadow:0 0 30px rgba(0,255,153,0.5);

}

.account-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:22px;

}

.account-item{

background:rgba(15,23,42,0.85);

padding:24px;

border-radius:22px;

transition:0.3s;

position:relative;

overflow:hidden;

}

.account-item::before{

content:"";

position:absolute;

top:-50%;
right:-50%;

width:140px;
height:140px;

background:rgba(0,255,153,0.04);

border-radius:50%;

}

.account-item:hover{

transform:translateY(-8px) scale(1.03);

box-shadow:
0 0 25px rgba(0,255,153,0.2),
0 0 60px rgba(0,255,153,0.12);

}

.account-item h3{

font-size:16px;

color:#00ff99;

margin-bottom:10px;

}

.account-item p{

font-size:24px;

font-weight:700;

}

/* ========================================= */
/* QUICK ACTIONS */
/* ========================================= */

.quick-actions{

background:rgba(7,18,38,0.88);

padding:35px;

border-radius:35px;

}

.quick-actions h2{

font-size:30px;

margin-bottom:25px;

}

.quick-btn{

display:block;

width:100%;

padding:18px;

margin-bottom:18px;

border-radius:18px;

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

text-align:center;

font-weight:800;

text-decoration:none;

transition:0.3s;

position:relative;

overflow:hidden;

}

.quick-btn::after{

content:"";

position:absolute;

top:0;
left:-120%;

width:100%;
height:100%;

background:rgba(255,255,255,0.18);

transform:skewX(-20deg);

transition:0.5s;

}

.quick-btn:hover::after{

left:120%;

}

.quick-btn:hover{

transform:translateY(-6px);

box-shadow:0 0 45px rgba(0,255,153,0.6);

}

/* ========================================= */
/* PROGRESS */
/* ========================================= */

.progress-section{

margin-bottom:35px;

background:rgba(7,18,38,0.88);

padding:35px;

border-radius:35px;

}

.progress-section h2{

font-size:32px;

margin-bottom:25px;

}

.progress-bar{

width:100%;

height:22px;

background:#0f172a;

border-radius:50px;

overflow:hidden;

}

.progress-fill{

height:100%;

width:45%;

background:linear-gradient(
90deg,
#00ff99,
#00c97a,
#00ff99
);

background-size:200% 100%;

animation:
progressAnim 3s infinite alternate,
gradientMove 4s linear infinite;

border-radius:50px;

box-shadow:0 0 35px rgba(0,255,153,0.6);

}

@keyframes progressAnim{

0%{
width:35%;
}

100%{
width:55%;
}

}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}

}

.funded-badge{

display:inline-block;

padding:12px 22px;

border-radius:50px;

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

font-weight:800;

margin-top:22px;

box-shadow:0 0 35px rgba(0,255,153,0.5);

}

/* ========================================= */
/* CERTIFICATE */
/* ========================================= */

.certificate{

background:linear-gradient(135deg,#00ff99,#00c97a);

padding:40px;

border-radius:35px;

color:black;

position:relative;

overflow:hidden;

animation:certificateGlow 4s infinite alternate;

}

@keyframes certificateGlow{

0%{
box-shadow:0 0 30px rgba(0,255,153,0.2);
}

100%{
box-shadow:0 0 60px rgba(0,255,153,0.45);
}

}

.certificate h2{

font-size:40px;

margin-bottom:15px;

font-weight:800;

}

.certificate p{

font-size:18px;

margin-bottom:25px;

line-height:1.7;

}

.certificate a{

display:inline-block;

padding:16px 28px;

background:black;

color:#00ff99;

font-weight:800;

border-radius:18px;

text-decoration:none;

}

/* ========================================= */
/* SUPPORT */
/* ========================================= */

.support-btn{

position:fixed;

bottom:25px;
right:25px;

padding:18px 28px;

background:linear-gradient(135deg,#00ff99,#00c97a);

color:black;

font-weight:700;

border-radius:50px;

text-decoration:none;

z-index:9999;

animation:
pulse 2s infinite,
floatBtn 4s ease-in-out infinite;

}

@keyframes pulse{

0%{
box-shadow:0 0 20px rgba(0,255,153,0.4);
}

50%{
box-shadow:0 0 40px rgba(0,255,153,0.8);
}

100%{
box-shadow:0 0 20px rgba(0,255,153,0.4);
}

}

@keyframes floatBtn{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0px);
}

}

/* ========================================= */
/* MOBILE */
/* ========================================= */

@media(max-width:1000px){

.main-grid{
grid-template-columns:1fr;
}

}

@media(max-width:850px){

.sidebar{
display:none;
}

.main{
margin-left:0;
padding:20px;
}

.welcome h1{
font-size:34px;
}

.account-header h2{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="particles">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>

<div class="cursor-glow"></div>

<script>

/* CURSOR GLOW */

document.addEventListener("mousemove",(e)=>{

glow.style.left = e.clientX + "px";
glow.style.top = e.clientY + "px";

});

</script>

</body>

</html>
